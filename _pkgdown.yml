url: https://yejinjo0220.github.io/dppca/

template:
  bootstrap: 5
  bootswatch: minty

home:
  title: "dppca"
  description: >
    Tools for differentially private PCA visualization,
    including private score plots, scree plots, and histogram-based
    exploratory analysis.

navbar:
  title: "dppca"
  structure:
    left: [theory, functions, algorithms]
    right: [search, github]

  components:
    theory:
      text: Theory
      menu:
      - text: PCA Background
        href: articles/pca_background.html
      - text: DP Direction
        href: articles/pc_direction.html
      - text: DP Scree
        href: articles/dp_scree.html
      - text: DP Score
        href: articles/dp_score.html

    functions:
      text: Functions
      href: reference/index.html

    algorithms:
      text: Algorithms
      href: articles/algorithms.html

articles:
- title: Theory
  navbar: Theory
  contents:
  - pca_background
  - pc_direction
  - dp_scree
  - dp_score

- title: Algorithms
  navbar: Algorithms
  contents:
  - algorithms

reference:
- title: "Shiny app"
  desc: >
    Interactive Shiny app for exploring differentially private PCA scree
    and score plots.
  contents:
  - dppca_app

- title: "DP PCA Visualization"
  desc: >
    Functions for constructing differentially private PCA visualizations.
  contents:
  - dp_score_plot
  - dp_scree_plot

- title: "DP PCA"
  desc: >
    Core functions for computing differentially private PCA score and scree
    quantities.
  contents:
  - dp_pc_dir
  - dp_score
  - dp_scree

- title: "Method controls"
  desc: >
    Helper functions for specifying method-specific tuning parameters.
  contents:
  - clipped_control
  - pmwm_control
  - huber_control

- title: "Group PCA Visualization"
  desc: >
    Functions for group-wise differentially private PCA score visualization.
  contents:
  - dp_score_group
  - dp_score_plot_group

- title: "Example datasets"
  desc: >
    Datasets included for examples and demonstrations.
  contents:
  - adult
  - eur_map
  - eur_map_g
  - gau
  - gau_g
