url: https://yejinjo0220.github.io/dppca/

template:
  bootstrap: 5
  bootswatch: minty

home:
  title: "dppca"
  description: >
    Tools for performing principal component analysis and constructing
    differentially private scree estimates and score-based visualizations,
    including private PCA directions, DP scree estimators, and 2D score
    histograms with additive and sparse DP mechanisms.

navbar:
  title: "dppca"
  structure:
    left: [theory, reference, articles]
    right: [search, github]

  components:
    theory:
      text: Theory
      menu:
      - text: PCA Background
        href: articles/pca_background.html
      - text: DP Direction
        href: articles/pc_direction.html
      - text: DP Scree
        href: articles/dp_scree.html
      - text: DP Score
        href: articles/dp_score.html

    reference:
      text: Reference
      href: reference/index.html

    articles:
      text: Algorithms
      href: articles/algorithms.html

articles:
- title: Theory
  navbar: Theory
  contents:
  - pca_background
  - pc_direction
  - dp_scree
  - dp_score

- title: Algorithms
  navbar: Algorithms
  contents:
  - algorithms

reference:

- title: "DP PCA"
  desc: >
    Core functions for computing principal component directions and
    differentially private scree and score summaries.
  contents:
  - dp_pc_dir
  - dp_scree
  - dp_score

- title: "DP PCA visualization"
  desc: >
    Plotting functions for differentially private PCA scree curves and
    score histograms.
  contents:
  - dp_scree_plot
  - dp_score_plot

- title: "Group score visualization"
  desc: >
    Functions for group-wise differentially private PCA score summaries and
    visualizations.
  contents:
  - dp_score_group
  - dp_score_plot_group

- title: "Method controls"
  desc: >
    Control objects for method-specific tuning parameters used in private
    scree estimation.
  contents:
  - clipped_control
  - pmwm_control
  - huber_control

- title: "Shiny app"
  desc: >
    Interactive Shiny app for exploring differentially private PCA scree
    and score plots.
  contents:
  - dppca_app

- title: "Example datasets"
  desc: >
    Datasets included for examples and demonstrations.
  contents:
  - adult
  - eur_map
  - eur_map_g
  - gau
  - gau_g

