url: https://yejinjo0220.github.io/dppca/

template:
  bootstrap: 5
  bootswatch: minty

home:
  title: "dppca"
  description: >
    Tools for performing principal component analysis and constructing
    differentially private scree estimates and score-based visualizations,
    including private PCA directions, DP scree estimators, and 2D score
    histograms with additive and sparse DP mechanisms.

navbar:
  title: "dppca"
  structure:
    left: [theory, reference, articles]
    right: [search, github]

  components:
    theory:
      text: Theory
      menu:
      - text: PCA Background
        href: articles/pca_background.html
      - text: DP Direction
        href: articles/pc_direction.html
      - text: DP Scree
        href: articles/dp_scree.html
      - text: DP Score
        href: articles/dp_score.html

    reference:
      text: Functions
      href: reference/index.html

    articles:
      text: Algorithms
      href: articles/algorithms.html

articles:
- title: Theory
  navbar: Theory
  contents:
  - pca_background
  - pc_direction
  - dp_scree
  - dp_score

- title: Algorithms
  navbar: Algorithms
  contents:
  - algorithms

reference:

- title: "Direction"
  desc: >
    Functions for estimating private principal component directions.
  contents:
  - dp_pc_dir

- title: "Scree"
  desc: >
    Functions for estimating and visualizing differentially private scree
    values. The control helpers specify method-specific tuning options for
    the clipped, private modified winsorized mean, and Huber-type scree
    estimators.
  contents:
  - dp_scree
  - dp_scree_plot
  - clipped_control
  - pmwm_control
  - huber_control

- title: "Score"
  desc: >
    Functions for constructing differentially private PCA score summaries,
    score plots, and group-wise score visualizations.
  contents:
  - dp_score
  - dp_score_plot
  - dp_score_group
  - dp_score_plot_group

- title: "Shiny app"
  desc: >
    Shiny app for exploring differentially private PCA scree and score plots
    through a graphical interface.
  contents:
  - dppca_app

- title: "Data"
  desc: >
    Datasets included for examples and demonstrations.
  contents:
  - adult
  - gau
  - gau_g
